<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルルブアーカイブ - TRPG ルールブック共有</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js?v=2"></script>
<link rel="stylesheet" href="style.css?v=14">
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>ルルブアーカイブ</h1>
    <p class="login-sub">TRPG ルールブック共有システム</p>
    <div id="loginForm">
      <div class="form-group">
        <label>ユーザーID</label>
        <input type="text" id="loginUsername" placeholder="英数字3文字以上" autocomplete="username">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="loginPassword" placeholder="4文字以上" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>表示名（新規登録時のみ）</label>
        <input type="text" id="loginDisplayName" placeholder="セッションで表示される名前">
      </div>
      <div id="loginError" class="login-error"></div>
      <button class="btn-login" onclick="doLogin()">ログイン</button>
      <button class="btn-signup" onclick="doSignup()">新規登録</button>
    </div>
  </div>
</div>

<!-- ===== メイン画面 ===== -->
<div id="mainApp" class="main-app" style="display:none;">

  <!-- ヘッダー -->
  <div class="header">
    <h1>ルルブアーカイブ</h1>
    <span class="header-sub">TRPG ルールブック共有</span>
    <div class="user-info">
      <span id="currentUser"></span>
      <button class="btn-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- モバイルFAB -->
  <button class="fab-upload" onclick="openRegister()">+</button>

  <div class="layout">
    <!-- サイドバー -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-header-title">フィルタ</span>
        <button class="sidebar-close" onclick="closeSidebar()">&times;</button>
      </div>
      <input type="text" class="search-box" id="searchBox" placeholder="タグ・テキストで検索...">

      <div class="tag-section">
        <div class="tag-section-title">システム</div>
        <div class="tag-list" id="systemTags"></div>
      </div>

      <div class="tag-section">
        <div class="tag-section-title">カテゴリ</div>
        <div class="tag-list" id="categoryTags"></div>
      </div>

      <div class="tag-section">
        <div class="tag-section-title">章・カテゴリ</div>
        <div class="tag-list" id="chapterTags"></div>
      </div>

      <div class="tag-section">
        <div class="tag-section-title">内容タグ</div>
        <div class="tag-list" id="contentTags"></div>
      </div>

      <div class="tag-section">
        <div class="tag-section-title">フィールド値</div>
        <div class="tag-list" id="fieldTags"></div>
      </div>

      <div class="tag-section">
        <div class="tag-section-title">ページ番号</div>
        <div class="tag-list" id="pageTags"></div>
      </div>

      <div class="filter-info" id="filterInfo">
        <span id="filterText"></span>
        <br>
        <button class="clear-btn" onclick="clearFilters()">フィルタ解除</button>
      </div>
    </div>

    <!-- メインエリア -->
    <div class="main">
      <div class="toolbar">
        <span class="result-count" id="resultCount"></span>
        <div class="view-toggle">
          <button class="view-btn" data-mode="text" onclick="setViewMode('text')">テキスト</button>
          <button class="view-btn" data-mode="list" onclick="setViewMode('list')">リスト</button>
        </div>
        <button class="sidebar-toggle" onclick="toggleSidebar()">フィルタ</button>
        <button class="btn-save-order" id="btnSaveOrder" onclick="saveOrder()" style="display:none;">順序を保存</button>
        <button class="upload-btn" onclick="openRegister()">+ 新規登録</button>
      </div>
      <div id="loadingIndicator" class="loading" style="display:none;">読み込み中...</div>
      <div class="grid grid-text" id="cardGrid"></div>
    </div>
  </div>
</div>

<!-- ===== 登録モーダル ===== -->
<div class="modal-overlay" id="registerModal">
  <div class="modal">
    <div class="modal-header">
      <h2>データを登録</h2>
      <button class="modal-close" onclick="closeRegister()">&times;</button>
    </div>
    <div class="modal-body">
      <!-- OCR補助（折りたたみ） -->
      <details class="ocr-details">
        <summary class="ocr-summary">画像からテキスト読み取り（OCR補助）</summary>
        <div class="ocr-inner">
          <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <p style="font-size:24px; margin-bottom:4px;">+</p>
            <p>画像をドラッグ＆ドロップ or 選択</p>
            <p style="font-size:11px; margin-top:4px; color:var(--text-dim);">PNG / JPG / WebP</p>
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFiles(this.files)">
          <div class="upload-preview" id="uploadPreview"></div>
          <div class="ocr-btn-row">
            <button class="btn-ocr" onclick="runOCR()">全体をOCR</button>
            <button class="btn-ocr btn-clip" onclick="openClipper()">範囲を選択してOCR</button>
          </div>
          <span class="ocr-status" id="ocrStatus"></span>
          <div class="ocr-usage-info" id="ocrUsageInfo" style="display:none;"></div>
          <textarea id="ocrResult" class="ocr-textarea" rows="3" placeholder="認識結果がここに表示されます"></textarea>
          <button class="btn-parse" id="btnParse" onclick="parseOcrToFields()" style="display:none;">OCR結果をフィールドに自動入力</button>
        </div>
      </details>

      <!-- システム選択 -->
      <div class="form-group">
        <label>ルールブック（システム）</label>
        <select id="uploadSystem"></select>
      </div>

      <!-- カテゴリ選択 -->
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="uploadCategory"></select>
      </div>

      <!-- カテゴリ別フィールド -->
      <div id="uploadFields" class="structured-fields-container" style="display:none;"></div>

      <!-- ページ番号 -->
      <div class="form-group">
        <label>ページ番号</label>
        <div class="hint">半角数字を入力（例: 142）。範囲は「142-145」のように</div>
        <input type="text" id="uploadPage" placeholder="例: 142">
      </div>

      <!-- タグ -->
      <div class="form-group">
        <label>タグ</label>
        <div class="hint">Enterキーで追加。下のボタンからも追加できます</div>
        <div class="tag-input-wrap" id="tagInputWrap" onclick="document.getElementById('tagInput').focus()">
          <input type="text" id="tagInput" placeholder="タグを入力してEnter...">
        </div>
        <div class="quick-tags" id="quickTags"></div>
      </div>

      <!-- タイトル / メモ -->
      <div class="form-group">
        <label>タイトル / メモ（任意）</label>
        <input type="text" id="uploadMemo" placeholder="例: エンジェルハイロゥのコンボ参考用">
      </div>

      <!-- 抽出テキスト（手入力可） -->
      <div class="form-group">
        <label>テキスト内容（手入力 or OCR結果）</label>
        <textarea id="uploadExtractedText" class="ocr-textarea" rows="4" placeholder="ルールテキストを直接入力、またはOCRで自動入力"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <span class="upload-status" id="uploadStatus"></span>
      <div style="display:flex; gap:8px;">
        <button class="btn-cancel" onclick="closeRegister()">キャンセル</button>
        <button class="btn-submit" id="submitBtn" onclick="submitRegister()">登録</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== 編集モーダル ===== -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h2>データを編集</h2>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>ルールブック（システム）</label>
        <select id="editSystem"></select>
      </div>
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="editCategory"></select>
      </div>
      <div id="editFields" class="structured-fields-container" style="display:none;"></div>
      <div class="form-group">
        <label>ページ番号</label>
        <input type="text" id="editPage" placeholder="例: 142">
      </div>
      <div class="form-group">
        <label>タグ</label>
        <div class="hint">Enterキーで追加</div>
        <div class="tag-input-wrap" id="editTagInputWrap" onclick="document.getElementById('editTagInput').focus()">
          <input type="text" id="editTagInput" placeholder="タグを入力してEnter...">
        </div>
        <div class="quick-tags" id="editQuickTags"></div>
      </div>
      <div class="form-group">
        <label>タイトル / メモ</label>
        <input type="text" id="editMemo" placeholder="例: エンジェルハイロゥのコンボ参考用">
      </div>
      <div class="form-group">
        <label>テキスト内容</label>
        <textarea id="editExtractedText" class="ocr-textarea" rows="4" placeholder="ルールテキストを入力"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <span class="upload-status" id="editStatus"></span>
      <div style="display:flex; gap:8px;">
        <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
        <button class="btn-submit" onclick="submitEdit()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== クリッパーモーダル ===== -->
<div class="modal-overlay" id="clipperModal">
  <div class="modal clipper-modal">
    <div class="modal-header">
      <h2>範囲を選択してOCR</h2>
      <button class="modal-close" onclick="closeClipper()">&times;</button>
    </div>
    <div class="modal-body clipper-body">
      <p class="clipper-hint">ドラッグで範囲を選択 → 「選択範囲をOCR」で認識</p>
      <div class="clipper-canvas-wrap" id="clipperCanvasWrap">
        <canvas id="clipperCanvas"></canvas>
      </div>
      <div class="clipper-actions">
        <button class="btn-ocr" id="clipOcrBtn" onclick="runClipOCR()" disabled>選択範囲をOCR</button>
        <button class="btn-cancel" onclick="resetClipSelection()">選択リセット</button>
        <span class="ocr-status" id="clipOcrStatus"></span>
      </div>
      <div class="clip-results" id="clipResults"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeClipper()">閉じる</button>
      <button class="btn-submit" onclick="applyClipResults()">結果を反映</button>
    </div>
  </div>
</div>

<script src="app.js?v=14"></script>
</body>
</html>
